spring.application.name=brochure-sync-service
spring.profiles.active=local

# Database configuration (values supplied via environment / profile)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Kafka configuration (event payloads are JSON strings)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=brochure-sync-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Actuator: expose health + info for readiness checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
